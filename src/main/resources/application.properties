# MySQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/NLDB?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Initialize schema
spring.sql.init.mode=always

# Server port — uses PORT env var (set by Render/cloud) or defaults to 8080
server.port=${PORT:8080}

# File Upload Limits (50MB for videos)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
