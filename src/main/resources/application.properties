# H2 Database Configuration (MySQL Compatibility Mode)
spring.datasource.url=jdbc:h2:mem:nldb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Auto-load schema.sql and data.sql
spring.sql.init.mode=always

# Server port — uses PORT env var (set by Render/cloud) or defaults to 8080
server.port=${PORT:8080}
